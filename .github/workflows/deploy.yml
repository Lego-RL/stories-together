name: Deploy Stories Together

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            
            # force load the full user environment to get the correct Node/NPM paths
            [ -f ~/.bashrc ] && . ~/.bashrc
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            # log versions to GitHub Actions output for verification
            echo "Using Node: $(node -v)"
            echo "Using NPM: $(npm -v)"
            cd ~/stories-together
            git pull origin main

            # build frontend
            cd frontend
            npm ci
            npm run build

            # sync python backend dependencies
            cd ../backend/app
            /home/ubuntu/.local/bin/uv sync

            # run possible alembic db migrations
            /home/ubuntu/.local/bin/uv run alembic upgrade head

            # restart backend
            sudo systemctl restart gunicorn
            echo "Deployment successful."